<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vitreous | 瑩透抽籤決定器</title>
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
</head>
<body class="light-mode"> <!-- 預設淺色模式 -->

    <!-- 背景流光效果 -->
    <div class="vibe-background"></div>

    <!-- 頂部功能列 -->
    <nav class="glass-nav">
        <button id="theme-toggle" class="glass-btn">切換模式</button>
    </nav>

    <!-- 首頁：六大模塊 -->
    <main id="home-screen" class="container">
        <div class="grid">
            <div class="glass-card" onclick="startDraw('menu')">
                <img src="assets/home/menu.svg" alt="選擇菜單">
                <span>選擇菜單</span>
            </div>
            <div class="glass-card" onclick="startDraw('restaurant')">
                <img src="assets/home/restaurant.svg" alt="選擇餐廳">
                <span>選擇餐廳</span>
            </div>
            <div class="glass-card" onclick="startDraw('price')">
                <img src="assets/home/price.svg" alt="選擇金額">
                <span>選擇金額</span>
            </div>
            <div class="glass-card" onclick="startDraw('count')">
                <img src="assets/home/count.svg" alt="選擇數目">
                <span>選擇數目</span>
            </div>
            <div class="glass-card" onclick="startDraw('drink')">
                <img src="assets/home/drink.svg" alt="選擇飲料店">
                <span>選擇飲料店</span>
            </div>
            <div class="glass-card" onclick="startDraw('decision')">
                <img src="assets/home/decision.svg" alt="要/不要">
                <span>要 / 不要</span>
            </div>
        </div>
    </main>

    <!-- 抽籤介面 (預設隱藏) -->
    <section id="draw-screen" class="container hidden">
        <div class="slot-machine glass-card">
            <img id="slot-img" src="" alt="抽籤中">
        </div>
        <div id="result-text" class="result-label"></div>
        <button onclick="goHome()" class="glass-btn home-btn">回首頁</button>
    </section>

    <script src="script.js"></script>
</body>
</html>
