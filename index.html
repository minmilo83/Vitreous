<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Vitreous | 瑩透抽籤決定器</title>
    
    <!-- PWA 與 行動端頂部欄位優化 -->
    <meta name="theme-color" content="#f4f7f9" media="(prefers-color-scheme: light)">
    <meta name="theme-color" content="#000000" media="(prefers-color-scheme: dark)">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <link rel="apple-touch-icon" href="assets/home/decision.svg">
    <link rel="manifest" href="manifest.json">
    
    <!-- 載入樣式表 -->
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- 1. 資源預載進度條 (JS 會自動填入內容，此處保留 shell) -->
    <!-- 如果你想讓載入畫面更快出現，可以將 script.js 內的 initProgressBar HTML 移至此處 -->
    
    <!-- 2. 動態流體背景 -->
    <div class="vibe-background"></div>

    <!-- 3. 頂部功能列 -->
    <nav class="glass-nav">
        <div class="nav-controls">
            <!-- PWA 安裝按鈕：預設隱藏，由 JS 判斷顯示 -->
            <button id="install-app" class="glass-btn hidden">下載 App</button>
            <button id="theme-toggle" class="glass-btn" aria-label="切換模式">🌓</button>
        </div>
    </nav>

    <!-- 4. 主頁面：六大決策模組 -->
    <main id="home-screen" class="container">
        <header class="home-header">
            <h1>Vitreous</h1>
            <p>讓直覺決定你的下一場冒險</p>
        </header>

        <div class="grid">
            <!-- 模組 1: 隨機菜單 -->
            <div class="glass-card" onclick="startDraw('menu')" role="button">
                <div class="card-content">
                    <img src="assets/home/menu.svg" alt="菜單">
                    <div class="card-text">
                        <small>EAT WHAT</small>
                        <span>隨機菜單</span>
                    </div>
                </div>
            </div>

            <!-- 模組 2: 探索餐廳 -->
            <div class="glass-card" onclick="startDraw('restaurant')" role="button">
                <div class="card-content">
                    <img src="assets/home/restaurant.svg" alt="餐廳">
                    <div class="card-text">
                        <small>WHERE TO</small>
                        <span>探索餐廳</span>
                    </div>
                </div>
            </div>

            <!-- 模組 3: 價格範圍 -->
            <div class="glass-card" onclick="startDraw('price')" role="button">
                <div class="card-content">
                    <img src="assets/home/price.svg" alt="價格">
                    <div class="card-text">
                        <small>BUDGET</small>
                        <span>價格範圍</span>
                    </div>
                </div>
            </div>

            <!-- 模組 4: 份量統計 -->
            <div class="glass-card" onclick="startDraw('count')" role="button">
                <div class="card-content">
                    <img src="assets/home/count.svg" alt="人數">
                    <div class="card-text">
                        <small>HOW MANY</small>
                        <span>份量統計</span>
                    </div>
                </div>
            </div>

            <!-- 模組 5: 飲料決定 (變速拉霸) -->
            <div class="glass-card" onclick="startDraw('tea-shop')" role="button">
                <div class="card-content">
                    <img src="assets/home/drink.svg" alt="飲料">
                    <div class="card-text">
                        <small>TEA SHOP</small>
                        <span>飲料決定</span>
                    </div>
                </div>
            </div>

            <!-- 模組 6: 要還是不要 (儀式感決策) -->
            <div class="glass-card" onclick="startDraw('decision')" role="button">
                <div class="card-content">
                    <img src="assets/home/decision.svg" alt="決定">
                    <div class="card-text">
                        <small>YES OR NO</small>
                        <span>終極決策</span>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <!-- 5. 抽籤動畫介面 -->
    <section id="draw-screen" class="container hidden">
        <div class="draw-container">
            <!-- 強化後的拉霸顯示區域 -->
            <div class="glass-card slot-machine">
                <img id="slot-img" src="assets/home/decision.svg" alt="正在抽籤">
            </div>
            
            <div class="result-area">
                <p id="result-text" class="result-label">準備中...</p>
            </div>

            <button class="glass-btn home-btn" onclick="goHome()">返回主頁</button>
        </div>
    </section>

    <!-- 載入核心邏輯 -->
    <script src="script.js"></script>
</body>
</html>
